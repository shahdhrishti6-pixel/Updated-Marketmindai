
<!DOCTYPE html>

    <script>
      // Safety check to prevent libraries from overwriting fetch
      // This must run before any other scripts
      (function() {
        const originalFetch = window.fetch;
        const protect = (obj) => {
          if (!obj) return;
          try {
            // Ensure fetch is always the original one but don't throw on set
            Object.defineProperty(obj, 'fetch', {
              enumerable: true,
              configurable: true,
              get: function() { return originalFetch; },
              set: function(v) { 
                console.warn('Blocked attempt to overwrite fetch on', obj);
                return true; 
              }
            });
          } catch (e) {}
        };

        protect(window);
        protect(self);
        if (typeof globalThis !== 'undefined') protect(globalThis);

        // Prevent circular structure errors when stringifying window or document
        window.toJSON = function() { return '[object Window]'; };
        if (typeof self !== 'undefined') self.toJSON = window.toJSON;
        if (typeof globalThis !== 'undefined') globalThis.toJSON = window.toJSON;
        if (typeof document !== 'undefined') {
          document.toJSON = function() { return '[object Document]'; };
        }

        if (typeof global === 'undefined') {
          // Create a dedicated object for global to avoid direct window proxying
          // which can cause circular JSON errors if stringified.
          const globalObject = {
            fetch: originalFetch,
            toJSON: function() { return '[object global]'; }
          };

          window.global = new Proxy(globalObject, {
            get: function(target, prop) {
              if (prop === 'toJSON') return target.toJSON;
              if (prop in target) return target[prop];
              
              const val = window[prop];
              // Bind functions to window to avoid "Illegal invocation"
              if (typeof val === 'function') {
                return val.bind(window);
              }
              return val;
            },
            set: function(target, prop, value) {
              if (prop === 'fetch') {
                target[prop] = value;
                return true;
              }
              try {
                window[prop] = value;
              } catch (e) {
                target[prop] = value;
              }
              return true;
            }
          });
        }

        if (typeof process === 'undefined') {
          window.process = { 
            env: { NODE_ENV: 'development' },
            toJSON: function() { return '[object process]'; }
          };
        }
      })();
    </script>
